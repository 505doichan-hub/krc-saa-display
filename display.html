<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>SAA受信画面</title>
  <style>
    :root {
      --navy: #061a44;
      --gold: #ffe600;
      --red: #d71920;
      --blue: #005bac;
      --meeting: #e6e6e6;
      --green: #067647;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
      -webkit-text-size-adjust: 100%;
    }
    #messageBox {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
    }
    #displayMessage {
      display: block;
      width: 99.5vw;
      max-width: 99.5vw;
      max-height: 98dvh;
      margin: 0;
      padding: 0;
      text-align: center;
      font-weight: 1000;
      line-height: 0.92;
      letter-spacing: 0.01em;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: normal;
      overflow: hidden;
      color: inherit;
      font-size: min(38vh, 26vw); /* JSが効かない時でも巨大に表示 */
    }
    #messageBox.idle { background: #000 !important; color: #fff !important; }
    #messageBox.navy { background: var(--navy) !important; color: var(--gold) !important; }
    #messageBox.red { background: var(--red) !important; color: #fff !important; }
    #messageBox.white { background: #fff !important; color: #000 !important; }
    #messageBox.meeting { background: var(--meeting) !important; color: #000 !important; }
    #messageBox.meeting #displayMessage { white-space: nowrap !important; line-height: 0.92 !important; }
    #messageBox.free { background: var(--blue) !important; color: #fff !important; }
    #messageBox.ok { background: var(--green) !important; color: #fff !important; }
    #displayStatus {
      position: fixed;
      right: 8px;
      bottom: 6px;
      z-index: 10;
      font-size: 10px;
      color: rgba(255,255,255,.25);
      pointer-events: none;
    }
    #messageBox.white + #displayStatus,
    #messageBox.meeting + #displayStatus { color: rgba(0,0,0,.25); }
  </style>
</head>
<body>
  <div id="messageBox" class="idle"><div id="displayMessage">ーーー</div></div>
  <div id="displayStatus">Firebase接続準備中...</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=6"></script>
  <script>
    (() => {
      const COLLECTION = "saaCue";
      const DOC_ID = "currentMessage";
      const IDLE = "ーーー";

      const forcedBreaks = new Map([
        ["まとめをお願いします", "まとめを\nお願いします"],
        ["マイクを近づけてください", "マイクを\n近づけてください"],
        ["もう少し大きな声でお願いします", "もう少し大きな声で\nお願いします"],
        ["ゆっくりお願いします", "ゆっくり\nお願いします"],
        ["ゆっくりお願い", "ゆっくり\nお願い"],
        ["次へお願いします", "次へ\nお願いします"],
        ["次へお願い", "次へ\nお願い"],
        ["もう少し話してください", "もう少し\n話してください"],
        ["もう少し話して", "もう少し\n話して"],
        ["マイクをONにしてください", "マイクをONに\nしてください"],
        ["終わってください", "終わって\nください"]
      ]);

      function $(id) { return document.getElementById(id); }
      function setStatus(text) { $("displayStatus").textContent = text; }

      function inferType(text, type) {
        if (type) return type;
        if (!text) return "idle";
        if (text === "あと５分" || text === "あと３分") return "navy";
        if (text === "あと１分" || text === "終わってください" || text === "STOP") return "red";
        if (text === "OK") return "ok";
        if (/^第.*回例会$/.test(text)) return "meeting";
        return "white";
      }

      function splitToMaxTwoLines(text) {
        const s = String(text || "").trim() || IDLE;
        if (forcedBreaks.has(s)) return forcedBreaks.get(s);
        if (s.length <= 7) return s;
        const punct = ["、", "。", " ", "　"];
        const mid = Math.ceil(s.length / 2);
        for (let offset = 0; offset < 6; offset++) {
          for (const pos of [mid - offset, mid + offset]) {
            if (pos > 0 && pos < s.length && punct.includes(s[pos])) {
              return s.slice(0, pos + 1).trim() + "\n" + s.slice(pos + 1).trim();
            }
          }
        }
        return s.slice(0, mid).trim() + "\n" + s.slice(mid).trim();
      }

      function fitText() {
        const box = $("messageBox");
        const el = $("displayMessage");
        if (!box || !el) return;

        const isMeeting = box.classList.contains("meeting");
        const maxW = Math.max(100, window.innerWidth * (isMeeting ? 0.985 : 0.995));
        const maxH = Math.max(100, window.innerHeight * (isMeeting ? 0.86 : 0.985));

        el.style.lineHeight = isMeeting ? "0.92" : "0.92";
        el.style.whiteSpace = isMeeting ? "nowrap" : "pre-line";
        el.style.fontSize = isMeeting ? "120px" : "300px";

        let low = isMeeting ? 50 : 40;
        let high = isMeeting ? 1600 : 1800;
        let best = isMeeting ? 180 : 120;

        for (let i = 0; i < 42; i++) {
          const mid = (low + high) / 2;
          el.style.fontSize = mid + "px";
          const ok = el.scrollWidth <= maxW && el.scrollHeight <= maxH;
          if (ok) {
            best = mid;
            low = mid + 1;
          } else {
            high = mid - 1;
          }
        }
        el.style.fontSize = Math.floor(best) + "px";
      }

      let currentRef = null;
      let lastAckedId = "";

      function render(data) {
        const raw = String(data && data.text ? data.text : "").trim();
        const text = raw || IDLE;
        const type = inferType(raw, data && data.type);
        const box = $("messageBox");
        const el = $("displayMessage");
        box.className = type;
        el.textContent = type === "meeting" ? text : splitToMaxTwoLines(text);
        requestAnimationFrame(fitText);
        setTimeout(fitText, 60);
        setTimeout(fitText, 250);

        const messageId = data && data.messageId ? String(data.messageId) : "";
        if (currentRef && messageId && data.displayAckId !== messageId && lastAckedId !== messageId) {
          lastAckedId = messageId;
          setTimeout(() => {
            currentRef.set({
              displayAckId: messageId,
              displayedText: raw,
              displayAckAt: firebase.firestore.FieldValue.serverTimestamp(),
              displayClientTime: new Date().toISOString()
            }, { merge: true }).catch(err => {
              console.error(err);
              setStatus("表示確認送信エラー: " + err.message);
            });
          }, 120);
        }
      }

      function init() {
        try {
          if (!window.firebaseConfig || !window.firebaseConfig.apiKey) {
            throw new Error("firebase-config.jsが読み込めません");
          }
          if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
          const db = firebase.firestore();
          const ref = db.collection(COLLECTION).doc(DOC_ID);
          currentRef = ref;
          setStatus("Firebase接続完了");
          ref.onSnapshot(snapshot => {
            setStatus("Firebase接続完了");
            render(snapshot.exists ? snapshot.data() : { text: "", type: "idle" });
          }, err => {
            setStatus("受信エラー: " + err.message);
            render({ text: "受信エラー", type: "red" });
          });
          window.addEventListener("resize", fitText);
          window.addEventListener("orientationchange", () => setTimeout(fitText, 300));
        } catch (err) {
          setStatus("Firebase接続エラー: " + err.message);
          render({ text: "接続エラー", type: "red" });
        }
      }

      document.addEventListener("DOMContentLoaded", init);
    })();
  </script>
</body>
</html>
